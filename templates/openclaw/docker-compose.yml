# =============================================================================
# dockyard / openclaw — Docker Compose
# Autonomous coding agent with LLM access.
# All instance-specific values come from .env (at VOLUMES_BASE).
# =============================================================================
name: openclaw

services:
  openclaw:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        AGENT_USER: agent
        AGENT_UID: "${AGENT_UID}"
        NEOVIM_VERSION: "0.12.1"
        SSH_PORT: "22"
    container_name: agent-${AGENT_NAME}
    hostname: ${AGENT_NAME}
    restart: unless-stopped
    ports:
      - "127.0.0.1:${SSH_PORT}:22"
    volumes:
      - ${VOLUMES_BASE}/workspace:/workspace
      - ${VOLUMES_BASE}/nvim-data:/home/agent/.local/share/nvim
      - ${VOLUMES_BASE}/nvim-state:/home/agent/.local/state/nvim
      - ${VOLUMES_BASE}/ssh/authorized_keys:/home/agent/.ssh/authorized_keys
      - ${VOLUMES_BASE}/secrets:/secrets:ro
      - ${VOLUMES_BASE}/logs:/logs
    environment:
      AGENT_NAME: "${AGENT_NAME}"
      AGENT_USER: agent
      LITELLM_BASE_URL: "http://host.gateway.internal:4000"
    # Replace with agent entrypoint when ready:
    # command: ["/workspace/start.sh"]
    command: ["sleep", "infinity"]
    extra_hosts:
      - "host.gateway.internal:host-gateway"
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 16G
        reservations:
          cpus: "0.5"
          memory: 512M
