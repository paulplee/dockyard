# =============================================================================
# dockyard / openclaw — Docker Compose
# Autonomous coding agent with LLM access.
# All instance-specific values come from .env (at VOLUMES_BASE).
# =============================================================================
name: openclaw

services:
  openclaw:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        AGENT_USER: agent
        AGENT_UID: "${AGENT_UID}"
        NEOVIM_VERSION: "0.12.1"
        SSH_PORT: "22"
        NODE_MAJOR: "${NODE_MAJOR:-24}"
    container_name: dy-${CONTAINER_NAME}
    hostname: ${CONTAINER_NAME}
    restart: unless-stopped
    privileged: true
    cgroup: host
    stop_signal: SIGRTMIN+3
    tmpfs:
      - /run
      - /run/lock
      - /tmp:exec
    ports:
      - "127.0.0.1:${SSH_PORT}:22"
    volumes:
      - ${VOLUMES_BASE}/workspace:/workspace
      - ${VOLUMES_BASE}/openclaw-data:/home/agent/.openclaw
      - ${VOLUMES_BASE}/nvim-data:/home/agent/.local/share/nvim
      - ${VOLUMES_BASE}/nvim-state:/home/agent/.local/state/nvim
      - ${VOLUMES_BASE}/ssh/authorized_keys:/home/agent/.ssh/authorized_keys
      - ${VOLUMES_BASE}/secrets:/secrets:ro
      - ${VOLUMES_BASE}/logs:/logs
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    environment:
      CONTAINER_NAME: "${CONTAINER_NAME}"
      AGENT_USER: agent
      LITELLM_BASE_URL: "http://host.gateway.internal:4000"
    extra_hosts:
      - "host.gateway.internal:host-gateway"
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 16G
        reservations:
          cpus: "0.5"
          memory: 512M
