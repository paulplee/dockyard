# =============================================================================
# dockyard / hermes-agent — Nous Research Hermes Agent
# Autonomous coding agent powered by the Hermes Agent framework.
# Extends dev-env with Python-based Hermes Agent tooling and systemd support.
# =============================================================================
name: hermes-agent
description: Autonomous coding agent powered by Nous Research Hermes Agent framework

# Directories created under $VOLUMES_BASE; first group is owned by the agent
# user (mode 2770), second group stays root-owned.
agent_dirs:
  - config
  - hermes
  - hermes-data
  - hermes-venv
  - nvim-data
  - nvim-state
  - logs
root_dirs:
  - ssh
  - secrets

# Files copied from the shared/ tree into the build staging directory before
# `docker compose build` runs. Paths are relative to the repo root.
shared_files:
  - src: shared/entrypoint.sh
    dst: entrypoint.sh
  - src: shared/boot-seed.sh
    dst: boot-seed.sh

build_args:
  - name: DASHBOARD_PORT
    prompt: "Dashboard port on host"
    default: "9119"
  - name: WORKSPACE_PATH
    prompt: "Workspace path on host (local dir or NAS mount)"
    default: "{VOLUMES_BASE}/workspace"
  - name: HERMES_VERSION
    prompt: "Hermes Agent git ref to install (branch, tag, or commit)"
    default: "main"
  - name: DNS_SERVER
    prompt: "Primary DNS server (LAN resolver)"
    default: "10.10.1.2"

host_files:
  - src: env.example
    dst: secrets/env.example
